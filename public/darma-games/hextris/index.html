<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Hextris · Darma Games</title>
    <meta name="description" content="Hextris integrated as a local Darma browser game.">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, minimal-ui">
    <link rel="icon" type="image/png" href="favicon.ico">
    <link rel="stylesheet" href="style/fa/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="style/style.css">
    <script type="text/javascript" src="vendor/hammer.min.js"></script>
    <script type="text/javascript" src="vendor/js.cookie.js"></script>
    <script type="text/javascript" src="vendor/jsonfn.min.js"></script>
    <script type="text/javascript" src="vendor/keypress.min.js"></script>
    <script type="text/javascript" src="vendor/jquery.js"></script>
    <script type="text/javascript" src="js/save-state.js"></script>
    <script type="text/javascript" src="js/view.js"></script>
    <script type="text/javascript" src="js/wavegen.js"></script>
    <script type="text/javascript" src="js/math.js"></script>
    <script type="text/javascript" src="js/darma_audio_theme.js"></script>
    <script type="text/javascript" src="js/Block.js"></script>
    <script type="text/javascript" src="js/Hex.js"></script>
    <script type="text/javascript" src="js/Text.js"></script>
    <script type="text/javascript" src="js/comboTimer.js"></script>
    <script type="text/javascript" src="js/checking.js"></script>
    <script type="text/javascript" src="js/update.js"></script>
    <script type="text/javascript" src="js/render.js"></script>
    <script type="text/javascript" src="js/input.js"></script>
    <script type="text/javascript" src="js/main.js"></script>
    <script type="text/javascript" src="js/initialization.js"></script>
    <script src="vendor/sweet-alert.min.js"></script>
  </head>
  <body data-darma-hex-theme="classic">
    <canvas id="canvas"></canvas>
    <div id="overlay" class="faded overlay"></div>
    <div id="startBtn"></div>

    <div id="darmaHexControls" class="darmaHexControls" aria-label="Hextris Darma controls">
      <div class="darmaHexThemes" role="group" aria-label="Choose Hextris theme">
        <button type="button" class="darmaHexThemeBtn is-active" data-theme="classic">Classic</button>
        <button type="button" class="darmaHexThemeBtn" data-theme="neon">Neon</button>
        <button type="button" class="darmaHexThemeBtn" data-theme="citrus">Citrus</button>
        <button type="button" class="darmaHexThemeBtn" data-theme="violet">Violet</button>
      </div>
      <button type="button" id="darmaHexSoundToggle" class="darmaHexSoundToggle" aria-pressed="true">Sound on</button>
    </div>

    <div id="helpScreen" class="unselectable">
      <div id="inst_main_body"></div>
    </div>
    <img id="openSideBar" class="helpText" src="./images/btn_help.svg" alt="How to play">
    <div class="faded overlay"></div>
    <img id="pauseBtn" src="./images/btn_pause.svg" alt="Pause">
    <img id="restartBtn" src="./images/btn_restart.svg" alt="Restart">
    <div id="HIGHSCORE">HIGH SCORE</div>
    <div id="highScoreInGameText">
      <div id="highScoreInGameTextHeader">HIGH SCORE</div><div id="currentHighScore">0</div>
    </div>

    <div id="gameoverscreen">
      <div id="container">
        <div id="gameOverBox" class="GOTitle">GAME OVER</div>
        <div id="cScore">0</div>
        <div id="highScoresTitle" class="GOTitle">HIGH SCORES</div>
        <div class="score"><span class="scoreNum">1.</span> <div id="1place" style="display:inline;">0</div></div>
        <div class="score"><span class="scoreNum">2.</span> <div id="2place" style="display:inline;">0</div></div>
        <div class="score"><span class="scoreNum">3.</span> <div id="3place" style="display:inline;">0</div></div>
      </div>
      <div id="bottomContainer">
        <img id="restart" src="./images/btn_restart.svg" height="57" alt="Restart Hextris">
        <div id="buttonCont" aria-hidden="true"></div>
      </div>
    </div>
  </body>
</html>
